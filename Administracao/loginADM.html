session_start();

// Se o administrador já estiver logado, redireciona direto para a index do painel
if (isset($_SESSION['admin_id'])) {
    header("Location: indexADM.php");
    exit();
}

// Captura de mensagens de erro ou sucesso passadas via URL
$mensagem_erro = "";
if (isset($_GET['erro'])) {
    switch ($_GET['erro']) {
        case 'email_existe':
            $mensagem_erro = "Atenção: Este e-mail já está cadastrado como administrador!";
            break;
        case 'senha_incorreta':
            $mensagem_erro = "Erro: Senha incorreta! Tente novamente.";
            break;
        case 'usuario_inexistente':
            $mensagem_erro = "Erro: Administrador não encontrado com este e-mail.";
            break;
        case 'acesso_negado':
            $mensagem_erro = "Por favor, faça login para acessar o painel administrativo.";
            break;
    }
}

$mensagem_sucesso = "";
if (isset($_GET['sucesso']) && $_GET['sucesso'] == 'cadastrado') {
    $mensagem_sucesso = "Administrador cadastrado com sucesso! Faça seu login.";
}

<script>
    function toggleForm(mode) {
        const loginSection = document.getElementById('login-section');
        const signupSection = document.getElementById('signup-section');
        const infoLogin = document.getElementById('info-login');
        const infoSignup = document.getElementById('info-signup');

        if (mode === 'signup') {
            loginSection.classList.add('hidden');
            signupSection.classList.remove('hidden');
            infoLogin.classList.add('hidden');
            infoSignup.classList.remove('hidden');
        } else {
            signupSection.classList.add('hidden');
            loginSection.classList.remove('hidden');
            infoSignup.classList.add('hidden');
            infoLogin.classList.remove('hidden');
        }
    }

    // Mantém a aba certa aberta caso o erro seja originado no cadastro
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('erro')) {
            const erro = urlParams.get('erro');
            if (erro === 'email_existe') {
                toggleForm('signup');
            }
        }
    }
</script>
