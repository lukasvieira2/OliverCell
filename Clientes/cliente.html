<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Faz uma requisição para um arquivo que checa a sessão
        fetch('../Php/sessao_usuario.php')
            .then(response => response.json())
            .then(data => {
                if (data.logado) {
                    // Preenche o nome do usuário na tela
                    document.getElementById('nome-usuario').textContent = data.nome.toUpperCase();
                } else {
                    // Se não estiver logado, joga de volta para a tela de Login
                    window.location.href = "../Login.php";
                }
            })
            .catch(error => {
                console.error("Erro ao verificar sessão:", error);
                // Fallback caso dê erro na requisição (opcional)
                document.getElementById('nome-usuario').textContent = "USUÁRIO";
            });
    });
</script>
